[build]
  command = ""
  publish = "."

# SPA fallback — serve index.html for any route with no matching static file
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never cache JS/CSS so browsers always get the latest version
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "no-store"

# Images and fonts can be cached
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
